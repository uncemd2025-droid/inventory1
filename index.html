  }
  doc.setFont('helvetica', 'bold'); doc.setFontSize(7.5); doc.setTextColor(0,0,0);
  doc.text('NTPC AREA ENGINEER / EIC / HOS', sigLeftX, sigY); sigY += 4.5;
  doc.setFont('helvetica', 'normal');
  doc.text('Name: ' + (record.inspector || '______________________'), sigLeftX, sigY);

  // ── Right block: Contractor ──────────────────────────────────────────────
  let sigYR = y;

  if (record.contractorSignature) {
    try { doc.addImage(record.contractorSignature, 'JPEG', sigRightX, sigYR, sigImgW, sigImgH); } catch(e) {}
    sigYR += sigImgH + 2;
  } else {
    doc.setDrawColor(180,180,180);
    doc.line(sigRightX, sigYR + sigImgH, sigRightX + sigImgW, sigYR + sigImgH);
    sigYR += sigImgH + 2;
  }
  doc.setFont('helvetica', 'bold'); doc.setFontSize(7.5); doc.setTextColor(0,0,0);
  doc.text('CONTRACTOR', sigRightX, sigYR); sigYR += 4.5;
  doc.setFont('helvetica', 'normal');
  doc.text('Name: ' + (record.contractorName || '______________________'), sigRightX, sigYR); sigYR += 4.5;
  doc.text('Date: ' + formatDate(record.date), sigRightX, sigYR);

  // Advance y past whichever block is taller
  y = Math.max(sigY, sigYR) + 8;

  y += 4;
  doc.setDrawColor(180, 180, 180);
  doc.line(margin, y, W - margin, y); y += 4;
  doc.setFontSize(7); doc.setTextColor(100, 100, 100);
  doc.text('LMI/FGUTPS/SAFETY/OD/OPS/SAFT/005/safety-16   Rev. No.: R1 June 2024', margin, y);
  doc.text('Page 1 of ' + (record.ladderPhoto ? '2' : '1'), W - margin, y, { align: 'right' });

  if (record.ladderPhoto) {
    doc.addPage();
    doc.setFont('helvetica', 'bold'); doc.setFontSize(11); doc.setTextColor(0, 0, 0);
    doc.text('LADDER PHOTO — EVIDENCE OF CHECK', W / 2, 18, { align: 'center' });
    doc.setFont('helvetica', 'normal'); doc.setFontSize(9);
    doc.text(`Ladder No: ${ladder.ladderNo}   Inspection Date: ${formatDate(record.date)}`, W / 2, 26, { align: 'center' });
    try {
      const img = new Image();
      img.src = record.ladderPhoto;
      await new Promise(res => { img.onload = res; img.onerror = res; });
      const maxW = W - margin * 2, maxH = 220;
      let iw = img.naturalWidth || 800, ih = img.naturalHeight || 600;
      let rw = maxW, rh = (ih / iw) * maxW;
      if (rh > maxH) { rh = maxH; rw = (iw / ih) * maxH; }
      const lx = (W - rw) / 2;
      doc.addImage(record.ladderPhoto, 'JPEG', lx, 32, rw, rh);
    } catch (e) { doc.text('(Image could not be rendered)', W / 2, 80, { align: 'center' }); }
    doc.setFontSize(7); doc.setTextColor(100, 100, 100);
    doc.text('LMI/FGUTPS/SAFETY/OD/OPS/SAFT/005/safety-16   Rev. No.: R1 June 2024', margin, 285);
    doc.text('Page 2 of 2', W - margin, 285, { align: 'right' });
  }

  // Convert to base64 and upload to Google Drive folder "Ladder Records"
  const pdfBase64 = doc.output('datauristring').split(',')[1];
  const fileName = `Ladder_Inspection_${ladder.ladderNo}_${record.date}_${record.id}.pdf`;

  try {
    const formData = new FormData();
    formData.append('file', pdfBase64);
    formData.append('name', fileName);
    formData.append('type', 'application/pdf');
    formData.append('folder', 'Ladder Records');

    const res = await fetch(API_URL, { method: 'POST', body: formData });
    const result = await res.json();
    if (result.url) {
      console.log('✅ Ladder inspection PDF uploaded to Drive:', result.url);
      return result.url;
    } else {
      console.warn('Drive upload returned no URL:', result);
      doc.save(fileName);
      return '';
    }
  } catch (err) {
    console.error('Drive upload failed, saving locally:', err);
    doc.save(fileName);
    return '';
  }
}

/* ---- PAST INSPECTIONS MODAL ---- */
function openPastInspections(ladderId) {
  const ladder = (state.ladders || []).find(l => l.id === ladderId);
  if (!ladder) return;

  // Debug: log raw state so we can see what came back from Sheets
  console.log('[PastInspections] ladderId:', ladderId, 'ladder.id:', ladder.id);
  console.log('[PastInspections] ladder.inspections count:', (ladder.inspections||[]).length);
  console.log('[PastInspections] full ladder object:', JSON.stringify(ladder, null, 2));

  const inspections = (ladder.inspections || []).slice().sort((a, b) => safeDate(b.date) - safeDate(a.date));

  /* Prompt user to paste a Drive URL and save it onto the inspection record */
  function linkDriveUrl(inspId) {
    const url = prompt('Paste the Google Drive / PDF link for this inspection:');
    if (!url || !url.trim()) return;
    persist(d => ({
      ...d,
      ladders: (d.ladders || []).map(l => l.id === ladderId
        ? { ...l, inspections: (l.inspections || []).map(i =>
            i.id === inspId ? { ...i, driveUrl: url.trim() } : i) }
        : l)
    }));
    modal.remove();
    setTimeout(() => openPastInspections(ladderId), 100);
  }

  const rows = inspections.length === 0
    ? [el('div', { class: 'text-sm text-slate-500 text-center py-8' }, 'No inspections recorded yet.')]
    : inspections.map((insp, idx) => {
      const inspNo = inspections.length - idx;
      return el('div', { class: 'border-b py-3 px-2 anim-row-in hover:bg-slate-50 rounded-lg' }, [
        el('div', { style: 'display:flex;align-items:center;justify-content:space-between;gap:8px' }, [
          /* left: number + date + dept */
          el('div', { style: 'display:flex;align-items:center;gap:12px' }, [
            el('div', { style: 'width:32px;height:32px;border-radius:50%;background:#e0f2fe;color:#0284c7;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0' }, `#${inspNo}`),
            el('div', {}, [
              el('div', { style: 'font-size:13px;font-weight:600;color:#1e293b' }, `Inspection #${inspNo}`),
              el('div', { style: 'font-size:11px;color:#64748b;margin-top:1px' },
                formatDate(insp.date) + (insp.department ? ` · ${insp.department}` : '')),
            ])
          ]),
          /* right: PDF link or Link button + Delete */
          el('div', { style: 'display:flex;align-items:center;gap:6px;flex-shrink:0' }, [
            insp.driveUrl
              ? el('a', {
                  href: insp.driveUrl, target: '_blank',
                  style: 'padding:5px 12px;background:#f0fdf4;color:#15803d;border:1px solid #86efac;border-radius:7px;font-size:11.5px;font-weight:600;text-decoration:none'
                }, '📄 View Checklist')
              : el('button', {
                  style: 'padding:5px 11px;background:#fffbeb;color:#92400e;border:1px solid #fcd34d;border-radius:7px;font-size:11.5px;font-weight:600;cursor:pointer',
                  onclick: () => linkDriveUrl(insp.id)
                }, '🔗 Link PDF'),
            el('button', {
              style: 'padding:5px 10px;border:1px solid #fecaca;color:#dc2626;background:#fff5f5;border-radius:7px;font-size:11px;cursor:pointer',
              onclick: () => {
                if (!confirm('Delete this inspection record?')) return;
                persist(d => ({
                  ...d,
                  ladders: (d.ladders || []).map(l => l.id === ladderId
                    ? { ...l, inspections: (l.inspections || []).filter(i => i.id !== insp.id) }
                    : l)
                }));
                modal.remove();
                setTimeout(() => openPastInspections(ladderId), 100);
              }
            }, 'Delete')
          ])
        ])
      ]);
    });

  const modal = el('div', { class: 'fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4' },
    el('div', { class: 'bg-white rounded-xl flex flex-col shadow-2xl', style: 'width:560px;max-height:85vh' }, [
      el('div', { style: 'padding:16px 20px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0' }, [
        el('div', {}, [
          el('div', { style: 'font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:#94a3b8' }, 'Inspection History'),
          el('h3', { style: 'font-size:17px;font-weight:700;font-family:DM Sans,sans-serif;color:#1e293b;margin-top:2px' },
            `${ladder.ladderNo}${ladder.description ? ' — ' + ladder.description : ''}`),
        ]),
        el('button', { style: 'font-size:20px;color:#94a3b8;cursor:pointer;background:none;border:none', onclick: () => modal.remove() }, '✕')
      ]),
      el('div', { style: 'flex:1;overflow-y:auto;padding:8px 12px' }, rows),
      el('div', { style: 'padding:12px 20px;border-top:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center;background:#f8fafc;border-radius:0 0 12px 12px;flex-shrink:0' }, [
        el('span', { style: 'font-size:12px;color:#64748b' }, `${inspections.length} inspection${inspections.length !== 1 ? 's' : ''} total`),
        el('button', {
          style: 'padding:8px 18px;background:#0ea5e9;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer',
          onclick: () => { modal.remove(); openInspectionModal(ladderId); }
        }, '+ New Inspection')
      ])
    ])
  );
  showAnimatedModal(modal);
}
</script>

  if(appReady) document.dispatchEvent(new CustomEvent('statechange'));
