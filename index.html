              el('th', { class: 'p-2 text-left' }, 'Description'),
              el('th', { class: 'p-2 w-36 text-center' }, 'Yes / No / N/A'),
              el('th', { class: 'p-2 text-left' }, 'Remarks'),
            ])),
            checklistTbody
          ])
        )
      ]),

      // Observations
      el('div', {}, [
        el('label', { class: 'text-xs font-semibold text-slate-500 uppercase' }, 'Additional Observations (incl. positives & penal actions taken)'),
        el('textarea', { id: 'insp-obs', class: 'w-full mt-1 p-2 border rounded-lg text-sm', rows: '3', placeholder: 'Enter additional observations...' })
      ]),

      // Corrective actions
      el('div', {}, [
        el('label', { class: 'text-xs font-semibold text-slate-500 uppercase' }, 'Corrective Actions Completed'),
        el('textarea', { id: 'insp-corrective', class: 'w-full mt-1 p-2 border rounded-lg text-sm', rows: '2', placeholder: 'Describe corrective actions taken...' })
      ]),

      // Inspector & Contractor fields
      el('div', { class: 'grid grid-cols-2 gap-4' }, [
        el('div', {}, [
          el('div', { class: 'text-xs font-semibold text-slate-500 uppercase mb-1' }, 'Inspected By (NTPC Area Engineer/EIC/HOS)'),
          el('input', { id: 'insp-inspector', class: 'w-full p-2 border rounded-lg text-sm', placeholder: 'Name' }),
        ]),
        el('div', {}, [
          el('div', { class: 'text-xs font-semibold text-slate-500 uppercase mb-1' }, 'Contractor (Name)'),
          el('input', { id: 'insp-cname', class: 'w-full p-2 border rounded-lg text-sm', placeholder: 'Contractor name' }),
        ]),
      ]),

      // Signature uploads
      el('div', { class: 'grid grid-cols-2 gap-4' }, [
        buildSignatureUpload('Inspector Signature', 'sig-inspector', img => inspectorSignBase64 = img),
        buildSignatureUpload('Contractor Signature', 'sig-contractor', img => signatureBase64 = img),
      ]),

      // Ladder photo upload
      el('div', { class: 'border-2 border-dashed border-slate-200 rounded-xl p-4 text-center' }, [
        el('div', { class: 'text-xs font-semibold text-slate-500 uppercase mb-2' }, 'Picture of Ladder (Evidence of Check)'),
        el('label', { class: 'cursor-pointer inline-flex flex-col items-center gap-2' }, [
          el('div', { class: 'w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center text-2xl' }, '📷'),
          el('div', { class: 'text-sm text-slate-600' }, 'Click to upload ladder photo'),
          el('div', { class: 'text-xs text-slate-400' }, 'JPG, PNG — will appear on page 2 of PDF'),
          (function () {
            const inp = el('input', { type: 'file', accept: 'image/*', class: 'hidden', id: 'ladder-photo' });
            const preview = el('img', { class: 'hidden mt-2 rounded-lg max-h-32 mx-auto', id: 'ladder-photo-preview' });
            inp.addEventListener('change', e => {
              const file = e.target.files[0]; if (!file) return;
              const reader = new FileReader();
              reader.onload = ev => {
                ladderPhotoBase64 = ev.target.result;
                preview.src = ladderPhotoBase64;
                preview.classList.remove('hidden');
              };
              reader.readAsDataURL(file);
            });
            const wrap = el('div', {});
            wrap.appendChild(inp);
            wrap.appendChild(preview);
            return wrap;
          })()
        ])
      ]),

    ]),

    // Footer
    el('div', { class: 'p-5 border-t flex items-center justify-between bg-slate-50 rounded-b-xl' }, [
      el('div', { class: 'text-xs text-slate-400' }, 'LMI/FGUTPS/SAFETY/OD/OPS/SAFT/005/safety-16 · Rev. R1 June 2024'),
      el('div', { class: 'flex gap-3' }, [
        el('button', { class: 'px-4 py-2 border rounded-lg text-sm', onclick: () => modal.remove() }, 'Cancel'),
        el('button', {
          class: 'px-5 py-2 bg-sky-600 text-white rounded-lg font-semibold text-sm',
          onclick: async () => {
            const inspDate = document.getElementById('insp-date').value;
            if (!inspDate) { alert('Please enter the inspection date'); return; }

            // Collect checklist answers
            const checklistData = CHECKLIST_ITEMS.map((desc, i) => {
              const selected = document.querySelector(`input[name="chk-${i}"]:checked`);
              const remark = document.getElementById(`rem-${i}`)?.value || '';
              return { no: i + 1, description: desc, answer: selected ? selected.value : '—', remark };
            });

            const record = {
              id: uid(),
              date: inspDate,
              department: document.getElementById('insp-dept').value,
              area: document.getElementById('insp-area').value,
              contractor: document.getElementById('insp-contractor').value,
              inspector: document.getElementById('insp-inspector').value,
              contractorName: document.getElementById('insp-cname').value,
              observations: document.getElementById('insp-obs').value,
              correctiveActions: document.getElementById('insp-corrective').value,
              checklist: checklistData,
              inspectorSignature: inspectorSignBase64,
              contractorSignature: signatureBase64,
              ladderPhoto: ladderPhotoBase64,
              driveUrl: '',
            };

            modal.remove();

            // Generate PDF, upload to Drive, then save record with URL
            const statusToast = el('div', { id: 'drive-toast', class: 'fixed left-6 bottom-6 bg-slate-900 text-white px-5 py-3 rounded-xl shadow-xl z-50 text-sm flex items-center gap-3' }, [
              el('div', { class: 'w-4 h-4 border-2 border-white border-t-transparent rounded-full', style: 'animation:spinOnce 1s linear infinite' }),
              'Generating PDF & uploading to Google Drive…'
            ]);
            document.body.appendChild(statusToast);

            try {
              const driveUrl = await generateAndUploadInspectionPDF(ladder, record);
              record.driveUrl = driveUrl || '';
            } catch (e) {
              console.error('Drive upload failed:', e);
              record.driveUrl = '';
            }

            statusToast.remove();

            // Persist with driveUrl stored
            persist(d => ({
              ...d,
              ladders: (d.ladders || []).map(l => l.id === ladderId
                ? { ...l, inspections: [...(l.inspections || []), record] }
                : l)
            }));

            if (record.driveUrl) {
              const done = el('div', { class: 'fixed left-6 bottom-6 bg-emerald-700 text-white px-5 py-3 rounded-xl shadow-xl z-50 text-sm flex items-center gap-3' }, [
                '✅ Inspection saved & PDF uploaded to Google Drive'
              ]);
              document.body.appendChild(done);
              setTimeout(() => done.remove(), 4000);
            }
          }
        }, 'Save & Generate PDF')
      ])
    ])
  ]);

  const modal = el('div', { class: 'fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4' }, content);
  showAnimatedModal(modal);
}

function buildSignatureUpload(label, id, onLoad) {
  const preview = el('img', { class: 'hidden mt-2 rounded-lg max-h-20 border', id: id + '-preview' });
  const inp = el('input', { type: 'file', accept: 'image/*', class: 'hidden', id: id });
  inp.addEventListener('change', e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      onLoad(ev.target.result);
      preview.src = ev.target.result;
      preview.classList.remove('hidden');
    };
    reader.readAsDataURL(file);
  });
  return el('div', { class: 'border rounded-xl p-3' }, [
    el('div', { class: 'text-xs font-semibold text-slate-500 uppercase mb-2' }, label),
    el('label', { class: 'cursor-pointer flex items-center gap-2 text-sm text-sky-600 hover:underline' }, [
      '🖊 Upload signature image', inp
    ]),
    preview
  ]);
}

/* ---- GENERATE PDF & UPLOAD TO GOOGLE DRIVE ---- */
async function generateAndUploadInspectionPDF(ladder, record) {
  if (typeof window.jspdf === 'undefined') {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    document.head.appendChild(s);
    await new Promise(res => s.onload = res);
  }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

  const W = 210, margin = 14;
  let y = 14;

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(9);
  doc.setTextColor(0, 100, 200);
  doc.text('Periodic Safety Assessments (Internal to Station)', W / 2, y, { align: 'center' });
  y += 7;
  doc.setTextColor(0, 0, 0);
  doc.setFontSize(13);
  doc.text('PERIODIC LADDERS INTEGRITY CHECKLIST', W / 2, y, { align: 'center' });
  y += 8;

  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  const metaLines = [
    [`Department / Section: ${record.department || ''}`, `Area: ${record.area || ''}`, `Date: ${record.date}`],
    [`Contractor / Agency: ${record.contractor || ''}`],
    [`Ladder Number: ${ladder.ladderNo}   Make: ${ladder.make || ''}   PO No.: ${ladder.poNo || ''}`],
  ];
  metaLines.forEach(cols => {
    if (cols.length === 3) {
      doc.text(cols[0], margin, y);
      doc.text(cols[1], 110, y);
      doc.text(cols[2], 175, y);
    } else {
      doc.text(cols[0], margin, y);
    }
    y += 5.5;
  });
  y += 2;

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(8);
  doc.setFillColor(230, 235, 245);
  doc.rect(margin, y, W - margin * 2, 6, 'F');
  doc.text('#', margin + 2, y + 4);
  doc.text('Description', margin + 10, y + 4);
  doc.text('Yes/No/N/A', 148, y + 4);
  doc.text('Remarks', 170, y + 4);
  y += 6;

  doc.setFont('helvetica', 'normal');
  doc.setFontSize(7.5);

  record.checklist.forEach((item, i) => {
    const descLines = doc.splitTextToSize(item.description, 116);
    const rowH = Math.max(6, descLines.length * 4.2);
    if (y + rowH > 270) { doc.addPage(); y = 14; }
    if (i % 2 === 0) { doc.setFillColor(248, 250, 252); doc.rect(margin, y, W - margin * 2, rowH, 'F'); }
    doc.setDrawColor(210, 215, 225);
    doc.rect(margin, y, W - margin * 2, rowH);
    doc.setTextColor(80, 80, 80);
    doc.text(String(item.no), margin + 2, y + 4);
    doc.setTextColor(0, 0, 0);
    doc.text(descLines, margin + 10, y + 4);
    const ansColor = item.answer === 'Yes' ? [21, 128, 61] : item.answer === 'No' ? [185, 28, 28] : [100, 100, 100];
    doc.setTextColor(...ansColor);
    doc.setFont('helvetica', 'bold');
    doc.text(item.answer, 152, y + 4, { align: 'center' });
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(60, 60, 60);
    const remLines = doc.splitTextToSize(item.remark || '', 32);
    doc.text(remLines, 171, y + 4);
    y += rowH;
  });

  y += 5;
  if (y > 255) { doc.addPage(); y = 14; }

  doc.setFont('helvetica', 'bold'); doc.setFontSize(8); doc.setTextColor(0, 0, 0);
  doc.text('Additional Observations, incl. positives & penal actions taken:', margin, y); y += 5;
  doc.setFont('helvetica', 'normal'); doc.setFontSize(8);
  const obsLines = doc.splitTextToSize(record.observations || '(None)', W - margin * 2 - 4);
  doc.text(obsLines, margin, y); y += obsLines.length * 4.5 + 4;

  doc.setFont('helvetica', 'bold');
  doc.text('Corrective Actions Completed:', margin, y); y += 5;
  doc.setFont('helvetica', 'normal');
  const corrLines = doc.splitTextToSize(record.correctiveActions || '(None)', W - margin * 2 - 4);
  doc.text(corrLines, margin, y); y += corrLines.length * 4.5 + 5;

  if (y > 245) { doc.addPage(); y = 14; }
  doc.setFont('helvetica', 'bold'); doc.setFontSize(8);
  doc.text('INSPECTED BY: NTPC AREA ENGINEER/EIC/HOS (Name & Signature):', margin, y); y += 5;
  doc.setFont('helvetica', 'normal');
  doc.text(record.inspector || '___________________________', margin, y); y += 5;
  if (record.inspectorSignature) {
    try { doc.addImage(record.inspectorSignature, 'JPEG', margin, y, 50, 18); } catch (e) {}
    y += 22;
  }

  doc.setFont('helvetica', 'bold'); doc.setFontSize(8);
  doc.text('CONTRACTOR (Name, Signature, Date):', margin, y); y += 5;
  doc.setFont('helvetica', 'normal');
  doc.text(`${record.contractorName || '___________________'}   Date: ${record.date}`, margin, y); y += 5;
  if (record.contractorSignature) {
    try { doc.addImage(record.contractorSignature, 'JPEG', margin, y, 50, 18); } catch (e) {}
    y += 22;
  }

  y += 4;
  doc.setDrawColor(180, 180, 180);
  doc.line(margin, y, W - margin, y); y += 4;
  doc.setFontSize(7); doc.setTextColor(100, 100, 100);
  doc.text('LMI/FGUTPS/SAFETY/OD/OPS/SAFT/005/safety-16   Rev. No.: R1 June 2024', margin, y);
  doc.text('Page 1 of ' + (record.ladderPhoto ? '2' : '1'), W - margin, y, { align: 'right' });

  if (record.ladderPhoto) {
    doc.addPage();
    doc.setFont('helvetica', 'bold'); doc.setFontSize(11); doc.setTextColor(0, 0, 0);
    doc.text('LADDER PHOTO — EVIDENCE OF CHECK', W / 2, 18, { align: 'center' });
    doc.setFont('helvetica', 'normal'); doc.setFontSize(9);
    doc.text(`Ladder No: ${ladder.ladderNo}   Inspection Date: ${record.date}`, W / 2, 26, { align: 'center' });
    try {
      const img = new Image();
      img.src = record.ladderPhoto;
      await new Promise(res => { img.onload = res; img.onerror = res; });
      const maxW = W - margin * 2, maxH = 220;
      let iw = img.naturalWidth || 800, ih = img.naturalHeight || 600;
      let rw = maxW, rh = (ih / iw) * maxW;
      if (rh > maxH) { rh = maxH; rw = (iw / ih) * maxH; }
      const lx = (W - rw) / 2;
      doc.addImage(record.ladderPhoto, 'JPEG', lx, 32, rw, rh);
    } catch (e) { doc.text('(Image could not be rendered)', W / 2, 80, { align: 'center' }); }
    doc.setFontSize(7); doc.setTextColor(100, 100, 100);
    doc.text('LMI/FGUTPS/SAFETY/OD/OPS/SAFT/005/safety-16   Rev. No.: R1 June 2024', margin, 285);
    doc.text('Page 2 of 2', W - margin, 285, { align: 'right' });
  }

  // Convert to base64 and upload to Google Drive folder "Ladder Records"
  const pdfBase64 = doc.output('datauristring').split(',')[1];
  const fileName = `Ladder_Inspection_${ladder.ladderNo}_${record.date}_${record.id}.pdf`;

  try {
    const formData = new FormData();
    formData.append('file', pdfBase64);
    formData.append('name', fileName);
    formData.append('type', 'application/pdf');
    formData.append('folder', 'Ladder Records');

    const res = await fetch(API_URL, { method: 'POST', body: formData });
    const result = await res.json();
    if (result.url) {
      console.log('✅ Ladder inspection PDF uploaded to Drive:', result.url);
      return result.url;
    } else {
      console.warn('Drive upload returned no URL:', result);
      doc.save(fileName);
      return '';
    }
  } catch (err) {
    console.error('Drive upload failed, saving locally:', err);
    doc.save(fileName);
    return '';
  }
}

/* ---- PAST INSPECTIONS MODAL ---- */
function openPastInspections(ladderId) {
  const ladder = (state.ladders || []).find(l => l.id === ladderId);
  if (!ladder) return;
  const inspections = (ladder.inspections || []).slice().sort((a, b) => new Date(b.date) - new Date(a.date));

  const rows = inspections.length === 0
    ? [el('div', { class: 'text-sm text-slate-500 text-center py-8' }, 'No inspections recorded yet.')]
    : inspections.map((insp, idx) => {
      const inspNo = inspections.length - idx;
      return el('div', { class: 'flex items-center justify-between border-b py-3 px-2 anim-row-in hover:bg-slate-50 rounded-lg' }, [
        el('div', { class: 'flex items-center gap-4' }, [
          el('div', { class: 'w-8 h-8 rounded-full bg-sky-100 text-sky-700 flex items-center justify-center text-xs font-bold' }, `#${inspNo}`),
          el('div', {}, [
            el('div', { class: 'font-medium text-sm' }, `Inspection #${inspNo}`),
            el('div', { class: 'text-xs text-slate-500' }, insp.date),
          ])
        ]),
        el('div', { class: 'flex items-center gap-2' }, [
          insp.driveUrl
            ? el('a', {
                href: insp.driveUrl,
                target: '_blank',
                class: 'px-3 py-1.5 bg-sky-600 text-white rounded-lg text-xs font-semibold flex items-center gap-1'
              }, '📄 View Checklist')
            : el('span', { class: 'text-xs text-slate-400 italic' }, 'No file linked'),
          el('button', {
            class: 'px-2 py-1.5 border border-red-200 text-red-500 rounded-lg text-xs',
            onclick: () => {
              if (!confirm('Delete this inspection record?')) return;
              persist(d => ({
                ...d,
                ladders: (d.ladders || []).map(l => l.id === ladderId
                  ? { ...l, inspections: (l.inspections || []).filter(i => i.id !== insp.id) }
                  : l)
              }));
              modal.remove();
              setTimeout(() => openPastInspections(ladderId), 100);
            }
          }, 'Delete')
        ])
      ]);
    });

  const modal = el('div', { class: 'fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4' },
    el('div', { class: 'bg-white rounded-xl w-[520px] max-h-[80vh] flex flex-col shadow-2xl' }, [
      el('div', { class: 'p-5 border-b flex items-center justify-between' }, [
        el('div', {}, [
          el('div', { class: 'text-xs text-slate-500 uppercase tracking-wide' }, 'Inspection History'),
          el('h3', { class: 'text-lg font-bold mt-0.5' }, `${ladder.ladderNo}${ladder.description ? ' — ' + ladder.description : ''}`),
        ]),
        el('button', { class: 'text-slate-400 hover:text-slate-700 text-xl font-bold', onclick: () => modal.remove() }, '✕')
      ]),
      el('div', { class: 'flex-1 overflow-y-auto px-4 py-2' }, rows),
      el('div', { class: 'p-4 border-t flex justify-between items-center bg-slate-50 rounded-b-xl' }, [
        el('span', { class: 'text-sm text-slate-500' }, `${inspections.length} inspection${inspections.length !== 1 ? 's' : ''} total`),
        el('button', {
          class: 'px-4 py-2 bg-sky-600 text-white rounded-lg text-sm font-semibold',
          onclick: () => { modal.remove(); openInspectionModal(ladderId); }
        }, '+ New Inspection')
      ])
    ])
  );
  showAnimatedModal(modal);
}
</script>

  if(appReady) document.dispatchEvent(new CustomEvent('statechange'));
  updateNavActive();
