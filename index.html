<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Inventory Manager — EMD</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
/* ============================================================
   DESIGN SYSTEM — EMD Inventory Manager
   Brand palette:
     --brand-teal:   #0d7377   (primary actions, links)
     --brand-amber:  #d97706   (Category A / Lighting accent)
     --brand-indigo: #4f46e5   (Category B / Cabling accent)
     --brand-slate:  #1e293b   (headings, nav bg)
     --page-bg:      #f4f6f9   (warm neutral background)
   Typography:
     Display/headings: DM Sans
     Body/data:        Inter
   ============================================================ */

:root {
  --brand-teal:        #38bdf8;
  --brand-teal-dark:   #0ea5e9;
  --brand-teal-light:  #e0f2fe;
  --brand-amber:       #fbbf24;
  --brand-amber-light: #fef9c3;
  --brand-indigo:      #818cf8;
  --brand-indigo-light:#eef2ff;
  --header-bg:         #ffffff;
  --header-border:     #e2e8f0;
  --page-bg:           #f8fafc;
  --card-bg:           #ffffff;
  --border:            rgba(0,0,0,.07);
  --shadow-sm:         0 1px 4px rgba(0,0,0,.05), 0 1px 2px rgba(0,0,0,.03);
  --shadow-md:         0 4px 16px rgba(0,0,0,.06), 0 1px 4px rgba(0,0,0,.03);
  --shadow-lg:         0 12px 40px rgba(0,0,0,.08), 0 2px 8px rgba(0,0,0,.04);
}

/* --- Base typography --- */
*, *::before, *::after { box-sizing: border-box; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--page-bg);
  color: #1e293b;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
h1, h2, h3, h4 {
  font-family: 'DM Sans', system-ui, sans-serif;
  letter-spacing: -.3px;
}

/* Tabular numbers for all data displays */
.tabnum, td, .metric-value {
  font-variant-numeric: tabular-nums;
}

/* ============================================================
   KEYFRAMES
   ============================================================ */
@keyframes fadeSlideIn {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes cardEntrance {
  from { opacity:0; transform:translateY(18px) scale(0.97); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}
@keyframes countUp {
  from { opacity:0; transform:translateY(6px) scale(0.92); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}
@keyframes barGrow {
  from { width:0 !important; }
}
@keyframes rowIn {
  from { opacity:0; transform:translateX(-10px); }
  to   { opacity:1; transform:translateX(0); }
}
@keyframes toastIn {
  from { opacity:0; transform:translateY(16px) scale(0.95); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}
@keyframes pieSlicePop {
  from { transform: scale(0.05); opacity:0; }
  to   { transform: scale(1);    opacity:1; }
}
@keyframes pulseRing {
  0%   { box-shadow:0 0 0 0   rgba(13,115,119,.35); }
  60%  { box-shadow:0 0 0 8px rgba(13,115,119,0); }
  100% { box-shadow:0 0 0 0   rgba(13,115,119,0); }
}
@keyframes spinOnce {
  from { transform:rotate(0deg); }
  to   { transform:rotate(360deg); }
}
@keyframes skeletonPulse {
  0%, 100% { opacity: .5; }
  50%       { opacity: 1; }
}

/* ============================================================
   GLOBAL PAGE LOAD
   ============================================================ */
body.app-ready #appShell { animation: fadeSlideIn .45s ease both; }
#appShell header         { animation: fadeSlideIn .4s ease both; }

/* ============================================================
   HEADER & NAV
   ============================================================ */
#appShell > div > header {
  background: #ffffff;
  border-radius: 14px;
  padding: 12px 20px;
  margin-bottom: 22px;
  box-shadow: var(--shadow-sm);
  border: 1px solid #e9eef5;
}
#appShell > div > header h1 {
  color: #1e293b;
  font-family: 'DM Sans', sans-serif;
  font-size: 19px;
  font-weight: 700;
  letter-spacing: -.4px;
}
#appShell > div > header .text-sm {
  color: #94a3b8;
  font-size: 11.5px;
}

/* Nav pill container */
nav {
  background: #f1f5f9;
  border-radius: 10px;
  padding: 4px;
  display: flex;
  align-items: center;
  gap: 2px;
}
nav a {
  display: inline-block;
  padding: 5px 12px;
  border-radius: 7px;
  font-size: 12.5px;
  font-weight: 500;
  font-family: 'Inter', sans-serif;
  transition: background .15s, color .15s, transform .12s;
  text-decoration: none;
  color: #475569;
}
nav a:hover {
  background: #e2e8f0;
  color: #1e293b;
  transform: translateY(-1px);
  text-decoration: none;
}
nav a.nav-active {
  background: var(--brand-teal-dark);
  color: #fff;
  box-shadow: 0 2px 8px rgba(14,165,233,.25);
}

/* Logout */
#logoutBtn {
  background: #fee2e2 !important;
  color: #dc2626 !important;
  border: 1px solid #fecaca !important;
  border-radius: 8px !important;
  font-family: 'Inter', sans-serif;
  font-size: 12.5px !important;
  font-weight: 600 !important;
  transition: background .15s, transform .12s, box-shadow .15s !important;
}
#logoutBtn:hover {
  background: #fecaca !important;
  transform: translateY(-1px) !important;
  box-shadow: 0 3px 10px rgba(220,38,38,.15) !important;
}

/* ============================================================
   METRIC CARDS
   ============================================================ */
.metric-card {
  background: var(--card-bg);
  border-radius: 16px;
  border: 1px solid var(--border);
  padding: 20px 22px 18px;
  box-shadow: var(--shadow-sm);
  animation: cardEntrance .45s ease both;
  position: relative;
  overflow: hidden;
}
.metric-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  border-radius: 4px 0 0 4px;
  background: var(--card-accent, #94a3b8);
}
.metric-card:nth-child(1){ animation-delay:.05s; --card-accent:#7dd3fc; }
.metric-card:nth-child(2){ animation-delay:.10s; --card-accent:#fcd34d; }
.metric-card:nth-child(3){ animation-delay:.15s; --card-accent:#a5b4fc; }
.metric-card:nth-child(4){ animation-delay:.20s; --card-accent:#67e8f9; }

.metric-icon {
  font-size: 22px;
  margin-bottom: 10px;
  display: block;
  line-height: 1;
}
.metric-label {
  font-family: 'Inter', sans-serif;
  font-size: 10.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: #94a3b8;
  margin-bottom: 5px;
}
.metric-value {
  font-family: 'DM Sans', sans-serif;
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -1.5px;
  line-height: 1;
  animation: countUp .5s .3s ease both;
  font-variant-numeric: tabular-nums;
}
.metric-sub {
  font-size: 11px;
  color: #94a3b8;
  margin-top: 5px;
  font-family: 'Inter', sans-serif;
}

/* ============================================================
   SKELETON LOADER
   ============================================================ */
.skeleton {
  background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
  background-size: 200% 100%;
  animation: skeletonSlide 1.4s ease infinite;
  border-radius: 8px;
}
@keyframes skeletonSlide {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.skeleton-card {
  background: #fff;
  border-radius: 16px;
  border: 1px solid #e2e8f0;
  padding: 20px 22px 18px;
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  position: relative;
}
.skeleton-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: #e2e8f0;
  border-radius: 4px 0 0 4px;
}
.skeleton-line {
  height: 10px;
  margin-bottom: 8px;
  border-radius: 5px;
}
.skeleton-value {
  height: 32px;
  width: 60%;
  margin: 8px 0 6px;
  border-radius: 8px;
}
.skeleton-section {
  background: #fff;
  border-radius: 16px;
  border: 1px solid #e2e8f0;
  padding: 24px;
  box-shadow: var(--shadow-sm);
}

/* ============================================================
   SECTION CARDS
   ============================================================ */
section.bg-white {
  animation: cardEntrance .45s ease both;
  border-radius: 16px !important;
  box-shadow: var(--shadow-sm) !important;
  border: 1px solid var(--border) !important;
}

/* Section heading style */
.section-heading {
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--brand-slate);
  letter-spacing: -.2px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-heading::before {
  content: '';
  display: inline-block;
  width: 3px;
  height: 16px;
  border-radius: 2px;
  background: #7dd3fc;
  flex-shrink: 0;
}

/* ============================================================
   PIE CHART SECTION
   ============================================================ */
.pie-card {
  background: var(--card-bg);
  border-radius: 16px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  padding: 20px 24px;
  transition: box-shadow .2s;
}
.pie-card:hover {
  box-shadow: var(--shadow-md);
}
.pie-card-title {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .4px;
  text-transform: uppercase;
  margin-bottom: 14px;
}
.pie-card-title.cat-a { color: #d97706; }
.pie-card-title.cat-b { color: #6366f1; }

.pie-legend-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 8px;
  border-radius: 7px;
  cursor: pointer;
  transition: background .15s;
  white-space: nowrap;
  font-size: 12.5px;
  font-family: 'Inter', sans-serif;
}
.pie-legend-row:hover { background: #f8fafc; }
.pie-legend-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.pie-legend-qty {
  font-size: 11px;
  color: #94a3b8;
  margin-left: auto;
  font-variant-numeric: tabular-nums;
}

/* SVG pie drop-shadow */
.pie-svg {
  filter: drop-shadow(0 2px 8px rgba(0,0,0,.09));
}

/* ============================================================
   TABLES
   ============================================================ */
table {
  font-family: 'Inter', sans-serif;
  font-size: 13px;
}
thead tr {
  background: #f8fafc;
  border-bottom: 2px solid #e2e8f0;
}
thead th {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .7px;
  color: #64748b;
  padding: 10px 12px;
}
thead th:first-child { text-align: left; }
tbody tr {
  border-bottom: 1px solid #f1f5f9;
  transition: background .12s;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(13,115,119,.04); }
tbody td {
  padding: 10px 12px;
  color: #334155;
  font-variant-numeric: tabular-nums;
}
/* Right-align numeric columns */
td.num { text-align: right; }
/* Sticky thead on scrollable tables */
.table-scroll { overflow-x: auto; }
.table-scroll thead th { position: sticky; top: 0; background: #f8fafc; z-index: 1; }

/* Table action buttons */
.tbl-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 7px;
  font-size: 11.5px;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  border: 1px solid #e2e8f0;
  background: #f8fafc;
  color: #475569;
  cursor: pointer;
  transition: background .13s, border-color .13s, transform .1s, box-shadow .13s;
  white-space: nowrap;
}
.tbl-btn:hover {
  background: #fff;
  border-color: #cbd5e1;
  box-shadow: 0 2px 6px rgba(0,0,0,.08);
  transform: translateY(-1px);
}
.tbl-btn-primary {
  background: #eff6ff;
  border-color: #bfdbfe;
  color: #1d4ed8;
}
.tbl-btn-primary:hover {
  background: #dbeafe;
  border-color: #93c5fd;
}
.tbl-btn-danger {
  color: #dc2626;
  border-color: #fecaca;
  background: #fff5f5;
}
.tbl-btn-danger:hover {
  background: #fee2e2;
  border-color: #fca5a5;
}

/* ============================================================
   VEHICLE RECORDS
   ============================================================ */
.vehicle-card {
  background: var(--card-bg);
  border-radius: 16px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  transition: box-shadow .2s, transform .2s;
}
.vehicle-card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}
.vehicle-card-header {
  background: linear-gradient(135deg, #eff6ff 0%, #e0f2fe 100%);
  border-bottom: 1px solid #bfdbfe;
  padding: 16px 18px 14px;
  display: flex;
  align-items: flex-start;
  gap: 14px;
}
.vehicle-icon {
  width: 40px; height: 40px;
  background: #dbeafe;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}
.vehicle-name {
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: #1e3a5f;
  letter-spacing: -.2px;
}
.vehicle-meta {
  font-size: 11.5px;
  color: #64748b;
  margin-top: 2px;
  font-family: 'Inter', sans-serif;
}
.vehicle-body {
  padding: 16px 18px;
}
.vehicle-info-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 16px;
  background: #f8fafc;
  border-radius: 10px;
  padding: 12px 14px;
}
.vehicle-info-item label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .6px;
  color: #94a3b8;
  display: block;
  margin-bottom: 2px;
  font-family: 'Inter', sans-serif;
}
.vehicle-info-item span {
  font-size: 12.5px;
  font-weight: 600;
  color: #334155;
  font-family: 'Inter', sans-serif;
}

/* Vehicle table */
.vehicle-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.vehicle-table thead th {
  background: #f1f5f9;
  font-size: 10.5px;
  letter-spacing: .5px;
  padding: 8px 10px;
  border-bottom: 1px solid #e2e8f0;
}
.vehicle-table tbody td {
  padding: 9px 10px;
  border-bottom: 1px solid #f1f5f9;
  vertical-align: middle;
}
.vehicle-table tbody tr:last-child td { border-bottom: none; }
.vehicle-table tbody tr:hover { background: #f8fafc; }

/* Expiry progress bar under vehicle table row */
.expiry-bar-wrap { margin-top: 4px; height: 3px; border-radius: 2px; background: #e2e8f0; overflow: hidden; }
.expiry-bar-fill { height: 100%; border-radius: 2px; transition: width .6s ease; }

/* ============================================================
   STATUS PILLS
   ============================================================ */
.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 20px;
  letter-spacing: .2px;
  font-family: 'Inter', sans-serif;
  white-space: nowrap;
}
.status-ok      { background: rgba(34,197,94,.12);  color: #15803d; }
.status-warn-60 { background: rgba(234,179,8,.15);  color: #a16207; }
.status-warn-30 { background: rgba(249,115,22,.15); color: #c2410c; }
.status-danger  { background: rgba(239,68,68,.12);  color: #dc2626; }
.status-none    { background: rgba(148,163,184,.1); color: #94a3b8; }

/* ============================================================
   ANIMATED BAR ROWS
   ============================================================ */
.anim-row-in { animation: rowIn .3s ease both; }
.anim-row-in:nth-child(1){animation-delay:.04s}
.anim-row-in:nth-child(2){animation-delay:.08s}
.anim-row-in:nth-child(3){animation-delay:.12s}
.anim-row-in:nth-child(4){animation-delay:.16s}
.anim-row-in:nth-child(5){animation-delay:.20s}
.anim-row-in:nth-child(6){animation-delay:.24s}
.anim-row-in:nth-child(7){animation-delay:.28s}
.anim-row-in:nth-child(8){animation-delay:.32s}
.anim-row-in:nth-child(9){animation-delay:.36s}
.anim-row-in:nth-child(10){animation-delay:.40s}

.qty-bar {
  height: 8px;
  border-radius: 4px;
  animation: barGrow .7s cubic-bezier(.2,.8,.2,1) both;
}

/* ============================================================
   BUTTONS (global)
   ============================================================ */
button, .btn {
  transition: background .15s, transform .12s, box-shadow .15s, opacity .15s !important;
}
button:hover:not(.no-pop):not([disabled]) {
  transform: translateY(-2px) scale(1.015) !important;
  box-shadow: 0 4px 12px rgba(0,0,0,.10) !important;
}
button:active:not(.no-pop):not([disabled]) {
  transform: scale(.97) translateY(0) !important;
}
.btn-record:hover { animation: pulseRing 1.4s ease; }

/* Branded primary button */
.btn-brand {
  background: #0ea5e9 !important;
  color: #fff !important;
  border: none !important;
  border-radius: 8px !important;
  font-family: 'Inter', sans-serif !important;
  font-weight: 600 !important;
}
.btn-brand:hover { background: #0284c7 !important; }

/* ============================================================
   FORM INPUTS
   ============================================================ */
input[type="text"], input[type="number"], input[type="date"],
input[type="password"], select, textarea {
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  transition: border-color .15s, box-shadow .15s !important;
  outline: none !important;
  border-color: #e2e8f0 !important;
}
input:focus, select:focus, textarea:focus {
  border-color: #38bdf8 !important;
  box-shadow: 0 0 0 3px rgba(56,189,248,.15) !important;
}

/* ============================================================
   LOGIN PAGE
   ============================================================ */
#loginPage {
  background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
}
#loginPage > div {
  animation: cardEntrance .5s .1s ease both;
  border: 1px solid #e2e8f0 !important;
}
#loginPage h1 { font-family: 'DM Sans', sans-serif; }
#loginSpinner { animation: spinOnce 1s linear infinite; }

/* ============================================================
   TOAST / UNDO SNACKBAR
   ============================================================ */
#undo-snack {
  animation: toastIn .3s ease both !important;
  border-radius: 12px !important;
  border: .5px solid rgba(255,255,255,.15) !important;
  box-shadow: 0 8px 28px rgba(0,0,0,.25) !important;
  font-size: 13px !important;
  font-family: 'Inter', sans-serif !important;
}
#undo-snack button {
  border-radius: 7px !important;
  font-size: 12px !important;
  font-weight: 600 !important;
  transition: opacity .12s !important;
}
#undo-snack button:hover {
  opacity: .8 !important;
  transform: none !important;
  box-shadow: none !important;
}

/* ============================================================
   MODAL
   ============================================================ */
.modal-backdrop { opacity:0; transition: opacity .22s ease; }
.modal-backdrop.open { opacity:1; }
.modal-content {
  transform: scale(0.93) translateY(10px);
  opacity: 0;
  transition: transform .26s cubic-bezier(.2,.8,.2,1), opacity .22s ease;
  border-radius: 16px !important;
  box-shadow: 0 20px 60px rgba(0,0,0,.2) !important;
  font-family: 'Inter', sans-serif;
}
.modal-backdrop.open .modal-content {
  transform: scale(1) translateY(0);
  opacity: 1;
}

/* ============================================================
   ACTIVITY ENTRIES
   ============================================================ */
.activity-added    { border-left: 3px solid #22c55e !important; }
.activity-consumed { border-left: 3px solid #ef4444 !important; }

/* ============================================================
   CATEGORY BOXES
   ============================================================ */
.category-box {
  transition: box-shadow .18s, transform .15s;
}
.category-box:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}

/* ============================================================
   EXPORT BUTTON
   ============================================================ */
.btn-export:hover {
  box-shadow: 0 4px 14px rgba(13,115,119,.4) !important;
}

/* ============================================================
   FOOTER
   ============================================================ */
#appShell footer {
  font-family: 'Inter', sans-serif;
  font-size: 11.5px;
  color: #94a3b8;
  text-align: center;
  padding-top: 8px;
}

/* ============================================================
   STAGGER ENTRANCE
   ============================================================ */
#app .grid > div:nth-child(1) { animation: cardEntrance .4s .08s ease both; }
#app .grid > div:nth-child(2) { animation: cardEntrance .4s .16s ease both; }

/* ============================================================
   NO-POP SUPPRESSOR
   ============================================================ */
.no-pop *, .no-pop *:hover {
  transform: none !important;
  box-shadow: none !important;
}
.no-pop button:hover {
  transform: none !important;
  box-shadow: none !important;
}
</style>
</head>

<body class="min-h-screen text-slate-900" style="background:var(--page-bg)">

<!-- ================= LOGIN PAGE ================= -->
<div
  id="loginPage"
  class="min-h-screen flex items-center justify-center px-6"
>
  <div class="flex flex-col md:flex-row items-center gap-14 bg-white rounded-2xl shadow-2xl p-12 max-w-6xl w-full">

<script>
/* ===== UI STYLE HELPERS ===== */
function injectHoverStyles(){
  if(document.getElementById('hover-styles')) return;
  const s=document.createElement('style');
  s.id='hover-styles';
  s.textContent = `
    .no-pop *, .no-pop *:hover { transform:none!important; box-shadow:none!important; transition:none!important; }
  `;

}

/* ===== SKELETON LOADER ===== */
function renderSkeletonHome() {
  // Use innerHTML directly since clear() may not be defined yet at call time
  app.innerHTML = '';
  // Metric cards skeleton
  const grid = document.createElement('div');
  grid.className = 'grid grid-cols-2 md:grid-cols-4 gap-4 mb-6';
  for (let i = 0; i < 4; i++) {

    card.className = 'skeleton-card';
    card.innerHTML = `
      <div class="skeleton skeleton-line" style="width:50%;height:10px"></div>
      <div class="skeleton skeleton-value"></div>
      <div class="skeleton skeleton-line" style="width:70%;margin-top:4px;height:10px"></div>
    `;
    grid.appendChild(card);
  }
  app.appendChild(grid);
  // Overview section skeleton
  const overview = document.createElement('div');
  overview.className = 'skeleton-section';
  overview.innerHTML = `
    <div class="skeleton skeleton-line" style="width:120px;height:14px;margin-bottom:20px"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
      <div style="display:flex;gap:16px;align-items:center">
        <div class="skeleton" style="width:220px;height:220px;border-radius:50%;flex-shrink:0"></div>
        <div style="flex:1">
          ${[60,45,70,55,40].map(w=>`<div class="skeleton skeleton-line" style="width:${w}%"></div>`).join('')}
        </div>
      </div>
      <div style="display:flex;gap:16px;align-items:center">
        <div class="skeleton" style="width:220px;height:220px;border-radius:50%;flex-shrink:0"></div>
        <div style="flex:1">
          ${[50,65,40,75,55].map(w=>`<div class="skeleton skeleton-line" style="width:${w}%"></div>`).join('')}
        </div>
      </div>
    </div>
  `;
  app.appendChild(overview);
}

/* ===== METRIC CARDS ===== */
function renderMetricCards() {
  const totalItems = state.items.length;
  const aItems = state.items.filter(i => i.category === 'A' || i.category.startsWith('A /')).length;
  const bItems = state.items.filter(i => i.category === 'B' || i.category.startsWith('B /')).length;
  const sevenDaysAgo = new Date(); sevenDaysAgo.setDate(sevenDaysAgo.getDate()-7);
  const recentCount = state.items.flatMap(i=>(i.history||[])).filter(h=>{
    try { return new Date(h.date) >= sevenDaysAgo; } catch{ return false; }
  }).length;

  const cards = [
    { label:'Total Items',   value: totalItems,   color:'#38bdf8', sub:'across all categories', icon:'📦' },
    { label:'Lighting (A)',  value: aItems,        color:'#fbbf24', sub:'Category A items', icon:'💡' },
    { label:'Cabling (B)',   value: bItems,        color:'#818cf8', sub:'Category B items', icon:'🔌' },
    { label:'Activity (7d)', value: recentCount,   color:'#34d399', sub:'entries this week', icon:'📋' },
  ];

  const grid = el('div', { class:'grid grid-cols-2 md:grid-cols-4 gap-4 mb-6 no-pop' });
  cards.forEach((c, i) => {
    const card = el('div', { class:'metric-card' }, [
      el('span', { class:'metric-icon' }, c.icon),
      el('div', { class:'metric-label' }, c.label),
      el('div', { class:'metric-value', style:`color:${c.color}`, 'data-target': c.value }, '0'),
      el('div', { class:'metric-sub' }, c.sub),
    ]);
    grid.appendChild(card);
  });

  requestAnimationFrame(() => {
    setTimeout(() => {
      grid.querySelectorAll('.metric-value').forEach(el => {
        const target = parseInt(el.getAttribute('data-target') || '0');
        animateCount(el, target, 700);
      });
    }, 100);
  });

  return grid;
}

function animateCount(el, target, duration) {
  let start = 0;
  const step = target / (duration / 16);
  const tick = () => {
    start = Math.min(start + step, target);
    el.textContent = Math.round(start);
    if (start < target) requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);
}

/* ===== HIGHLIGHT NAV LINK ===== */
function updateNavActive() {
  const h = location.hash || '#/';
  document.querySelectorAll('nav a').forEach(a => {
    const href = a.getAttribute('href');
    const active = h === href || (href !== '#/' && h.startsWith(href));
    a.classList.toggle('nav-active', active);
  });
}
window.addEventListener('hashchange', updateNavActive);
</script>

<script>
/* ================= GOOGLE SHEET SYNC ================= */
const API_URL = 'https://script.google.com/macros/s/AKfycbwYUe2czAX6RH4GbjJAqkQ9XZvNZ1VOUrxRpheEMJvgjad5NeIhkNrypL3qOjvfGA8I/exec';

      }
    }

};

const EXPORT_EXCLUDE_IDS = new Set();

/* ---- Save status indicator ---- */
function showSaveStatus(state) {
  let el = document.getElementById('save-status');
  if (!el) {
    el = document.createElement('div');
    el.id = 'save-status';
    el.style.cssText = `
      position:fixed; bottom:20px; right:20px; z-index:9999;
      display:flex; align-items:center; gap:8px;
      padding:8px 14px; border-radius:10px;
      font-family:'Inter',sans-serif; font-size:12px; font-weight:600;
      box-shadow:0 4px 16px rgba(0,0,0,.12);
      transition: opacity .3s ease, transform .3s ease;
    `;
    document.body.appendChild(el);
  }
  if (state === 'saving') {
    el.style.background = '#fffbeb';
    el.style.border = '1px solid #fcd34d';
    el.style.color = '#92400e';
    el.style.opacity = '1';
    el.style.transform = 'translateY(0)';
    el.innerHTML = `<span style="display:inline-block;width:10px;height:10px;border:2px solid #f59e0b;border-top-color:transparent;border-radius:50%;animation:spinOnce 1s linear infinite"></span> Saving…`;
  } else if (state === 'saved') {
    el.style.background = '#f0fdf4';
    el.style.border = '1px solid #86efac';
    el.style.color = '#15803d';
    el.style.opacity = '1';
    el.style.transform = 'translateY(0)';
    el.innerHTML = `✅ Saved`;
    setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateY(6px)'; }, 2000);
  } else if (state === 'error') {
    el.style.background = '#fef2f2';
    el.style.border = '1px solid #fca5a5';
    el.style.color = '#dc2626';
    el.style.opacity = '1';
    el.style.transform = 'translateY(0)';
    el.innerHTML = `❌ Save failed — check console`;
    setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateY(6px)'; }, 4000);
  }
}

async function saveToSheet(data) {
  if (!appReady) { console.warn('⏸️ Save skipped — app not ready'); return; }
  showSaveStatus('saving');

  // Build FormData — this is the ONLY format that:
  // 1. Works with mode:'no-cors' (doesn't trigger preflight)
  // 2. Maps to e.parameter.data in Google Apps Script doPost()
  const fd = new FormData();
  fd.append('data', JSON.stringify(data));

  try {
    // First attempt: normal fetch (works when served from http/https)
    const res = await fetch(API_URL, { method: 'POST', body: fd });
    console.log('✅ Saved to Google Sheet (normal)');
    showSaveStatus('saved');
    const ts = document.getElementById('syncTimestamp');
    if (ts) ts.textContent = new Date().toLocaleTimeString();
  } catch (corsErr) {
    // Second attempt: no-cors fire-and-forget (for file:// origins)
    console.warn('⚠️ Normal POST blocked (CORS), retrying with no-cors…', corsErr.message);
    try {
      const fd2 = new FormData();
      fd2.append('data', JSON.stringify(data));
      await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: fd2 });
      console.log('✅ Saved via no-cors (Apps Script received it)');
      showSaveStatus('saved');
      const ts = document.getElementById('syncTimestamp');
      if (ts) ts.textContent = new Date().toLocaleTimeString();
    } catch (err2) {
      console.error('❌ Both save attempts failed:', err2);
      showSaveStatus('error');
    }
  }
}
</script>

<script>
async function loadFromSheet() {
  console.log('🔄 Loading from Google Sheet...');
  if (sheetLoaded) return;
  sheetLoaded = true;

  if (typeof renderSkeletonHome === 'function') renderSkeletonHome();

  // Try fetch first (works when served from http/https)
  // Fall back to JSONP (works from file://)
  let data = null;

  try {
    const res = await fetch(API_URL + '?_t=' + Date.now());
    data = await res.json();
  } catch (fetchErr) {
    console.warn('⚠️ fetch blocked (file:// origin?), trying JSONP…');
    data = await loadViaJSONP(API_URL);
  }

  try {
    if (!data || !Array.isArray(data.items)) throw new Error('Invalid sheet data');
    state = data;
    console.log(`📦 Loaded ${state.items.length} items from Google Sheet`);

    if (state.items.length === 0) {
      try {
        const backup = localStorage.getItem('emd_inventory_backup');
        if (backup) {
          const backupData = JSON.parse(backup);
          if (backupData.items && backupData.items.length > 0) {
            const restore = confirm(
              `⚠️ Google Sheet returned 0 items, but a local backup has ${backupData.items.length} items.\n\nRestore from local backup?`
            );
            if (restore) { state = backupData; saveToSheet(state); }
          }
        }
      } catch(e) {}
    }

    const defaultVehicles = [
      { id:'APV-1', name:'Aerial Platform Vehicle – 15 Mtr', info:{ regNo:'UP32 ABCDFGHIJ 1234', makeModel:'Genie Z45', year:'2021' } },
      { id:'APV-2', name:'Aerial Platform Vehicle – 11 Mtr', info:{ regNo:'UP32 CD 5678', makeModel:'JLG 450AJ', year:'2021' } }
    ];
    if (!Array.isArray(state.vehicleRecords)) state.vehicleRecords = [];
    if (!Array.isArray(state.ladders)) state.ladders = [];

    state.vehicleRecords = defaultVehicles.map(def => {
      const existing = state.vehicleRecords.find(v => v.id === def.id) || {};
      return {
        id: def.id, name: def.name,
        info: { regNo: existing.info?.regNo || def.info.regNo, makeModel: existing.info?.makeModel || def.info.makeModel, year: existing.info?.year || def.info.year },
        records: {
          insurance:      existing.records?.insurance      || { date:'', file:'' },
          fitness:        existing.records?.fitness        || { date:'', file:'' },
          puc:            existing.records?.puc            || { date:'', file:'' },
          vehicleService: existing.records?.vehicleService || { date:'', file:'' },
          oemService:     existing.records?.oemService     || { date:'', file:'' },
          roadTax:        existing.records?.roadTax        || { date:'', file:'' }
        }
      };
    });

    if (!state.categories.includes('A')) state.categories.push('A');
    if (!state.categories.includes('B')) state.categories.push('B');

    appReady = true;
    document.body.classList.add('app-ready');
    const ts = document.getElementById('syncTimestamp');
    if (ts) ts.textContent = new Date().toLocaleTimeString();
    document.dispatchEvent(new CustomEvent('statechange'));
  } catch (err) {
    console.error('Failed to load from Google Sheet:', err);
    alert('Failed to load inventory from Google Sheet. Check console for details.');
  }
}

// JSONP loader — works from file:// origins where fetch is CORS-blocked
function loadViaJSONP(url) {
  return new Promise((resolve, reject) => {
    const cbName = '__gsJSONP_' + Date.now();
    const script = document.createElement('script');
    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error('JSONP timeout'));
    }, 10000);

    window[cbName] = function(data) {
      cleanup();
      resolve(data);
    };

    function cleanup() {
      clearTimeout(timeout);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    script.src = url + '?callback=' + cbName + '&_t=' + Date.now();
    script.onerror = () => { cleanup(); reject(new Error('JSONP script load failed')); };
    document.head.appendChild(script);
  });
}
</script>

<script>
/* ================= LOGIN SYSTEM ================= */
const ADMIN_PASSWORD = "emd123";
const loginPage  = document.getElementById("loginPage");
const appShell   = document.getElementById("appShell");
const loginInput = document.getElementById("loginPassword");
const loginBtn   = document.getElementById("loginSubmit");
const loginError = document.getElementById("loginError");
const logoutBtn  = document.getElementById("logoutBtn");

function showLogin() { loginPage.classList.remove("hidden"); appShell.classList.add("hidden"); }
function showApp()   { loginPage.classList.add("hidden");    appShell.classList.remove("hidden"); }
function isLoggedIn(){ return localStorage.getItem("isAdmin") === "true"; }
function requireAdmin(){ if(!isLoggedIn()){ alert("Admin login required"); showLogin(); return false; } return true; }

loginBtn.onclick = doLogin;

function doLogin() {
  const spinner = document.getElementById('loginSpinner');
  const text    = document.getElementById('loginBtnText');
  loginBtn.disabled = true;
  spinner.classList.remove('hidden');
  text.textContent = 'Logging in...';

    } else {
      loginError.classList.remove("hidden");

    spinner.classList.add('hidden');

loginInput.addEventListener("keydown", e => { if(e.key==="Enter") doLogin(); });

logoutBtn.onclick = () => {

<script>
/* ================= STATE HELPERS ================= */
function cleanupMainCategoryHistory() {
  let changed = false;
  const cleanedItems = state.items.map(item => {
    if ((item.category==='A'||item.category==='B') && (item.history||[]).length>0) {
      changed=true; return {...item,history:[]};
    } return item;
  });
  if(!changed){ alert('No history found for A / B items'); return; }
  state = {...state, items:cleanedItems};
  saveToSheet(state);
  alert('History for A and B items deleted successfully');
}

let undoTimer = null; let currentUndo = null;
let currentPieFilter = null;
let pendingBackup = null;
let recentLimit = 10;

function pushUndo(text,revert,timeout=6000){
  currentUndo={text,revert};
  renderUndo();
  if(undoTimer) clearTimeout(undoTimer);
  undoTimer=setTimeout(()=>{ currentUndo=null; renderUndo(); }, timeout);
}
function clearUndo(){ if(undoTimer) clearTimeout(undoTimer); undoTimer=null; currentUndo=null; renderUndo(); }

function persist(fn) {
  state = fn(JSON.parse(JSON.stringify(state)));
  // Always back up to localStorage so data survives re-login even if sheet save fails
  try { localStorage.setItem('emd_inventory_backup', JSON.stringify(state)); } catch(e) {}
  if(appReady) saveToSheet(state);
  else console.warn('⏸️ Persist skipped — app not ready');
  try { document.dispatchEvent(new CustomEvent('statechange')); } catch(e){}
}

function addCategory(name){ if(!name) return; if(state.categories.includes(name)) return; persist(d=>({...d,categories:[...d.categories,name]})); }
function editCategory(oldn,newn){ if(!newn||oldn===newn) return; persist(d=>({...d,categories:d.categories.map(c=>c===oldn?newn:c),items:d.items.map(it=>it.category===oldn?{...it,category:newn}:it)})); }
function deleteCategory(name){
  const snap=JSON.parse(JSON.stringify(state));
  persist(d=>({...d,categories:d.categories.filter(c=>c!==name),items:d.items.map(it=>it.category===name?{...it,category:'Uncategorized'}:it)}));
  pushUndo('Deleted category '+name,()=>{ state=snap; saveToSheet(state); document.dispatchEvent(new CustomEvent('statechange')); });
}
function addItem(item){
  if(!requireAdmin()) return;
  item.location=item.location||'';
  persist(d=>({...d,items:[item,...d.items]}));
}
function updateItem(id,patch){
  if(!requireAdmin()) return;
  persist(d=>({...d,items:d.items.map(it=>{
    if(it.id!==id) return it;
    const updated={...it,...patch};
    if('history' in patch) updated.history=Array.isArray(patch.history)?patch.history:[];
    return updated;
  })}));
}
function deleteItem(id){
  if(!requireAdmin()) return;
  const snap=JSON.parse(JSON.stringify(state));
  persist(d=>({...d,items:d.items.filter(i=>i.id!==id)}));
  pushUndo('Deleted item',()=>{ state=snap; saveToSheet(state); document.dispatchEvent(new CustomEvent('statechange')); });
}
function recordConsumption(itemId,amount,note='Consumed',entryDate=''){
  if(!requireAdmin()) return;
  persist(d=>({...d,items:d.items.map(it=>{
    if(it.id!==itemId) return it;
    return { ...it, qty:Math.max(0,Number(it.qty)-Number(amount)),
      history:[{id:uid(),date:entryDate||new Date().toISOString().slice(0,10),amount:Number(amount),note},...(it.history||[])]
    };
  })}));
}
function deleteActivity(itemId,entryId){
  const it=state.items.find(i=>i.id===itemId); if(!it) return;
  const entry=(it.history||[]).find(h=>h.id===entryId); if(!entry) return;
  persist(d=>({...d,items:d.items.map(i=>i.id===itemId?{...i,history:(i.history||[]).filter(h=>h.id!==entryId)}:i)}));
  pushUndo('Deleted activity',()=>{ persist(d=>({...d,items:d.items.map(i=>i.id===itemId?{...i,history:[entry,...(i.history||[])]}:i)})); });
}
function computeQtyFromHistory(item){
  return (item.history||[]).reduce((sum,h)=>h.note==='Stock added'?sum+Number(h.amount||0):sum-Number(h.amount||0),0);
}
</script>

<script>
/* ================= EXPORT / IMPORT ================= */
function exportExcel() {
  try {
    if(typeof XLSX==='undefined'){ alert('XLSX not loaded'); return; }
    const wb=XLSX.utils.book_new();
    const belongsToMain=(it,main)=>it.category===main||it.category.startsWith(main+' /');
    const usedNames=new Set(); const idToSheetName={};
    const itemsToExport=state.items.filter(it=>it&&!EXPORT_EXCLUDE_IDS.has(it.id));
    const pendingHistorySheets=[];

    itemsToExport.filter(it=>typeof it.category==='string'&&(it.category.startsWith('A /')||it.category.startsWith('B /'))).forEach(it=>{
      try {
        const hist=Array.isArray(it.history)&&it.history.length?it.history.slice().sort((a,b)=>new Date(a.date)-new Date(b.date)):[];
        if(!hist.length) return;
        const rows=hist.map(h=>[h.date,h.note==='Stock added'?'+'+Number(h.amount||0):'-'+Number(h.amount||0),h.note||'',h.receivedFrom||'']);
        const aoa=[[it.name||'Unnamed item'],['Date','Quantity','Note','Received From'],...rows];
        const base=`${it.name||'item'} history`; let sheetName=sanitizeSheetName(base); let n=1;
        while(usedNames.has(sheetName)){ const suf=` ${n++}`; sheetName=sanitizeSheetName(base.slice(0,31-suf.length))+suf; }
        usedNames.add(sheetName); idToSheetName[it.id]=sheetName;
        const ws=XLSX.utils.aoa_to_sheet(aoa); ws['!cols']=[{wpx:200},{wpx:80},{wpx:320},{wpx:380}];
        pendingHistorySheets.push({title:sheetName,ws});
      } catch(err){ console.error('history sheet error',err); }
    });

    function buildStockRows(main){
      const rows=[['Name','Qty','Unit','Location','Category','History']];
      state.items.filter(it=>it&&!EXPORT_EXCLUDE_IDS.has(it.id)&&belongsToMain(it,main)).forEach(it=>{
        rows.push([it.name||'',Number(it.qty||0),it.unit||'',it.location||'',it.category||main,idToSheetName[it.id]||'']);
      });
      return rows;
    }
    function appendStockSheet(title,aoaRows){
      const ws=XLSX.utils.aoa_to_sheet(aoaRows);
      ws['!cols']=[{wpx:220},{wpx:80},{wpx:80},{wpx:160},{wpx:160},{wpx:80}];
      const range=XLSX.utils.decode_range(ws['!ref']);
      for(let r=range.s.r+1;r<=range.e.r;r++){
        const cellAddr=XLSX.utils.encode_cell({c:5,r}); const cell=ws[cellAddr];
        if(cell&&typeof cell.v==='string'&&cell.v.trim()){
          const sn=cell.v.replace(/'/g,"''");
          ws[cellAddr]={t:'s',v:'History',l:{Target:`#'${sn}'!A1`,Tooltip:'View history'}};
        } else { ws[cellAddr]={t:'s',v:''}; }
      }
      if(!ws['!ref']) ws['!ref']='A1';
      XLSX.utils.book_append_sheet(wb,ws,sanitizeSheetName(title));
    }

    appendStockSheet('Stocks - A',buildStockRows('A'));
    appendStockSheet('Stocks - B',buildStockRows('B'));
    pendingHistorySheets.forEach(s=>XLSX.utils.book_append_sheet(wb,s.ws,s.title));
    XLSX.writeFile(wb,`inventory_${Date.now()}.xlsx`);
  } catch(err){ console.error('Export failed:',err); alert('Export failed — see console'); }
}

function exportCSV(){ exportExcel(); }
function importCSV(file,opts={merge:true}){
  return new Promise((resolve,reject)=>{
    Papa.parse(file,{header:true,skipEmptyLines:true,complete:(res)=>{
      const rows=res.data.map(r=>({id:r.id||uid(),name:r.name,category:r.category||'Uncategorized',qty:Number(r.qty||0),unit:r.unit||'pcs',location:r.location||'',history:[]}));
      persist(d=>opts.merge?({...d,categories:Array.from(new Set([...d.categories,...rows.map(r=>r.category)])),items:[...rows,...d.items]}):({...d,categories:Array.from(new Set(rows.map(r=>r.category))),items:rows}));
      resolve(rows.length);
    },error:reject});
  });
}

function importExcelBackup(file){
  if(!requireAdmin()) return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
    const items=[]; const categories=new Set(['A','B']);
    ['Stocks - A','Stocks - B'].forEach(sheetName=>{
      const ws=wb.Sheets[sheetName]; if(!ws) return;
      const range=XLSX.utils.decode_range(ws['!ref']);
      for(let r=range.s.r+1;r<=range.e.r;r++){
        const get=c=>ws[XLSX.utils.encode_cell({c,r})];
        const nameCell=get(0); if(!nameCell||!nameCell.v) continue;
        const qtyCell=get(1),unitCell=get(2),locCell=get(3),catCell=get(4),histCell=get(5);
        let historySheet='';
        if(histCell&&histCell.f){ const m=histCell.f.match(/#'(.+?)'!/); if(m) historySheet=m[1]; }
        const category=catCell?.v||(sheetName.includes('A')?'A':'B');
        categories.add(category);
        items.push({id:uid(),name:String(nameCell.v),qty:Number(qtyCell?.v||0),unit:unitCell?.v||'',location:locCell?.v||'',receivedFrom:'',category,historySheet,history:[]});
      }
    });
    items.forEach(item=>{
      if(!item.historySheet) return;
      const ws=wb.Sheets[item.historySheet]; if(!ws) return;
      const rows=XLSX.utils.sheet_to_json(ws,{header:1});
      rows.slice(2).forEach(r=>{
        if(!r[0]||!r[1]) return;
        const raw=String(r[1]).trim(); const signed=Number(raw.replace('+','')); const isAdded=raw.startsWith('+');
        item.history.push({id:uid(),itemId:item.id,date:new Date(r[0]).toISOString(),amount:Math.abs(signed),note:isAdded?'Stock added':(r[2]||'Consumed')});
      });
    });
    items.forEach(i=>delete i.historySheet);
    items.forEach(item=>{ if(item.history&&item.history.length) item.qty=computeQtyFromHistory(item); });
    pendingBackup={categories:Array.from(categories),items};
    showBackupPreview(pendingBackup);
  };
  reader.readAsArrayBuffer(file);
}

function showBackupPreview(data){
  const totalItems=data.items.length,totalCategories=data.categories.length;
  const totalHistory=data.items.reduce((s,i)=>s+(i.history?.length||0),0);
  const modal=document.createElement('div');
  modal.className='fixed inset-0 bg-black/40 flex items-center justify-center z-50';
  modal.innerHTML=`
    <div class="bg-white rounded-lg p-6 w-[520px] max-h-[80vh] overflow-auto">
      <h2 class="text-xl font-bold mb-2">Backup Preview</h2>
      <div class="text-sm text-slate-700 space-y-1 mb-4">
        <div><b>Items:</b> ${totalItems}</div><div><b>Categories:</b> ${totalCategories}</div>
        <div><b>History entries:</b> ${totalHistory}</div>
      </div>
      <h3 class="font-semibold mb-2">Sample items</h3>
      <ul class="text-sm border rounded p-2 mb-4 max-h-40 overflow-auto">
        ${data.items.slice(0,10).map(i=>`<li>• ${i.name} — ${i.qty} ${i.unit} (${i.category})</li>`).join('')}
      </ul>
      <div class="bg-yellow-50 border border-yellow-300 text-yellow-800 p-2 rounded text-sm mb-4">
        ⚠ This will <b>overwrite all current inventory data</b>.
      </div>
      <div class="flex justify-end gap-3">
        <button id="cancelRestore" class="px-4 py-2 border rounded">Cancel</button>
        <button id="confirmRestore" class="px-4 py-2 bg-red-600 text-white rounded">Restore Backup</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  modal.querySelector('#cancelRestore').onclick=()=>{ pendingBackup=null; modal.remove(); };
  modal.querySelector('#confirmRestore').onclick=()=>{
    state=pendingBackup;
    state.items=state.items.map(it=>{
      if((it.category==='A'||it.category==='B')&&!it.category.includes('/')) return {...it,history:[]};
      return it;
    });
    saveToSheet(state);
    document.dispatchEvent(new CustomEvent('statechange'));
    pendingBackup=null; modal.remove(); alert('Backup restored successfully');
  };
}
</script>

<script>
/* ================= UTILITIES ================= */
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function sanitizeSheetName(name){ return String(name).replace(/[\\\/\?\*\[\]]/g,'').substring(0,31)||'Sheet'; }

function renderUndo(){
  const old=document.getElementById('undo-snack'); if(old) old.remove();
  if(!currentUndo) return;
  const box=el('div',{id:'undo-snack',class:'fixed left-6 bottom-6 bg-slate-900 text-white px-4 py-3 rounded-xl shadow-xl flex items-center gap-3 z-50'},[
    currentUndo.text,

    el('button',{class:'text-xs px-2 py-1 border border-white/30 rounded-lg bg-white/10 text-white',onclick:clearUndo},'Dismiss')
  ]);
  document.body.appendChild(box);
}

function el(tag,attrs={},children=[]){
  const SVG_TAGS=new Set(['svg','path','circle','rect','text','g','line','polyline','polygon','ellipse']);
  const SVG_NS='http://www.w3.org/2000/svg';
  const isSvg=SVG_TAGS.has(tag);
  const d=isSvg?document.createElementNS(SVG_NS,tag):document.createElement(tag);
  for(const k in attrs){
    if(k==='class') d.className=attrs[k];
    else if(k==='html') d.innerHTML=attrs[k];
    else if(k.startsWith('on')&&typeof attrs[k]==='function') d.addEventListener(k.slice(2),attrs[k]);
    else d.setAttribute(k,attrs[k]);
  }
  (Array.isArray(children)?children:[children]).forEach(c=>{
    if(c==null) return;
    if(typeof c==='string'||typeof c==='number') d.appendChild(document.createTextNode(String(c)));
    else d.appendChild(c);
  });
  return d;
}
function clear(elm){ while(elm.firstChild) elm.removeChild(elm.firstChild); }
</script>

/* ---- PIE CHART ---- */
function renderCategoryPie(){
  // Category A = light amber/yellow palette, Category B = light indigo/violet palette
  const palettes = {
    A: ['#fcd34d','#fde68a','#fbbf24','#f59e0b','#fef3c7','#fef9c3'],
    B: ['#a5b4fc','#c7d2fe','#818cf8','#6366f1','#ddd6fe','#ede9fe'],
  };

  function buildDataForMain(main){
    const prefix=main+' /'; const buckets=new Map();
    (state.categories||[]).forEach(c=>{ if(c.startsWith(prefix)) buckets.set(c,0); });
    state.items.forEach(it=>{ if(typeof it.category==='string'&&it.category.startsWith(prefix)) buckets.set(it.category,(buckets.get(it.category)||0)+Number(it.qty||0)); });
    return Array.from(buckets.entries()).map(([k,v])=>({name:k,value:v})).filter(x=>x.value>0);
  }

  function renderSinglePie(main){
    const entries=buildDataForMain(main);
    const total=entries.reduce((s,e)=>s+e.value,0)||1;
    const size=220; const cx=size/2,cy=size/2,r=size*0.36;
    const colors = palettes[main] || palettes.A;
    const catLabel = main === 'A' ? '💡 Lighting' : '🔌 Cabling';
    const catClass = main === 'A' ? 'cat-a' : 'cat-b';

    const svg=el('svg',{width:size,height:size,viewBox:`0 0 ${size} ${size}`,class:'pie-svg'});
    let acc=0;

    function polar(a){ const rad=(a-90)*Math.PI/180; return {x:cx+r*Math.cos(rad),y:cy+r*Math.sin(rad)}; }
    function arc(start,end){ const s=polar(end),e=polar(start),large=(end-start)<=180?0:1; return `M ${s.x} ${s.y} A ${r} ${r} 0 ${large} 0 ${e.x} ${e.y} L ${cx} ${cy} Z`; }

    if(entries.length===0){
      svg.appendChild(el('circle',{cx,cy,r,fill:'#f1f5f9',stroke:'#e2e8f0','stroke-width':'1'}));
      svg.appendChild(el('text',{x:cx,y:cy-6,'text-anchor':'middle','font-size':'11','font-family':'Inter,sans-serif',fill:'#94a3b8'},'No data yet'));
      svg.appendChild(el('text',{x:cx,y:cy+10,'text-anchor':'middle','font-size':'9','font-family':'Inter,sans-serif',fill:'#cbd5e1'},'Add items to see chart'));
    } else {
      const animPaths=[];
      entries.forEach((en,i)=>{
        const start=(acc/total)*360; acc+=en.value; const end=(acc/total)*360;
        const path=el('path',{d:arc(start,end),fill:colors[i%colors.length],stroke:'#fff','stroke-width':'2.5',style:'cursor:pointer'});
        path.addEventListener('pointerenter',()=>{ path.setAttribute('opacity','0.82'); path.setAttribute('stroke-width','3.5'); });
        path.addEventListener('pointerleave',()=>{ path.setAttribute('opacity','1');    path.setAttribute('stroke-width','2.5'); });
        path.addEventListener('click',()=>{ currentPieFilter=(currentPieFilter===en.name)?null:en.name; routeRender(); });
        path.style.transformOrigin=`${cx}px ${cy}px`;
        path.style.transform='scale(0.05)';
        path.style.opacity='0';
        path.style.transition='transform 600ms cubic-bezier(.2,.8,.2,1), opacity 300ms ease';
        svg.appendChild(path);
        animPaths.push({path,index:i});
      });
      requestAnimationFrame(()=>{
        animPaths.forEach((pObj,idx)=>{
          setTimeout(()=>{ pObj.path.style.transform='scale(1)'; pObj.path.style.opacity='1'; },120+idx*80);
        });
      });
    }
    // Donut hole
    svg.appendChild(el('circle',{cx,cy,r:r*0.52,fill:'#fff'}));
    svg.appendChild(el('text',{x:cx,y:cy-7,'text-anchor':'middle','font-size':'13','font-weight':'700','font-family':'DM Sans,sans-serif',fill:'#1e293b'},main));
    svg.appendChild(el('text',{x:cx,y:cy+10,'text-anchor':'middle','font-size':'10','font-family':'Inter,sans-serif',fill:'#64748b'},`${entries.reduce((s,e)=>s+e.value,0)} qty`));

    // Legend
    const legend=el('div',{class:'flex flex-col gap-0.5 min-w-0'});
    entries.forEach((en,i)=>{
      const label=en.name===main?main:en.name.replace(main+' / ','');
      const pct = Math.round((en.value/total)*100);
      const row=el('div',{class:'pie-legend-row'},[
        el('div',{class:'pie-legend-dot',style:`background:${colors[i%colors.length]}`}),
        el('div',{style:'font-size:12px;color:#334155;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis'},label),

/* ---- QUICK ENTRY ---- */
function renderQuickForCategory(catName){
  const container=el('div',{});
  let selSub=catName,selItem='',amt=1,note='',entryDate='';
  function getSubcategories(){ const prefix=catName+' /'; const subs=(state.categories||[]).filter(c=>c===catName||c.startsWith(prefix)); return Array.from(new Set([catName,...subs.filter(s=>s!==catName)])); }
  function updateItemsForSub(){
    const itemSelect=container.querySelector('select.item-select'); if(!itemSelect) return;
    itemSelect.innerHTML='';
    if(selSub===catName){ itemSelect.appendChild(el('option',{value:''},'-- (select subcategory)')); selItem=''; return; }
    const list=state.items.filter(i=>i.category===selSub).slice().sort((a,b)=>a.name.localeCompare(b.name,undefined,{sensitivity:'base'}));
    if(list.length===0){ itemSelect.appendChild(el('option',{value:''},'-- no items --')); selItem=''; return; }
    list.forEach(i=>itemSelect.appendChild(el('option',{value:i.id},`${i.name} — ${i.qty} ${i.unit} (${i.location||'-'})`)));
    selItem=''; itemSelect.value='';
  }
  function updateSubSelect(){
    const subSelect=container.querySelector('select.sub-select'); if(!subSelect) return;
    subSelect.innerHTML='';
    const subs=getSubcategories();
    subs.forEach(s=>subSelect.appendChild(el('option',{value:s},s===catName?`${s} (main)`:s.replace(catName+' / ',''))));
    if(!subs.includes(selSub)) selSub=subs[0]||catName;
    subSelect.value=selSub; updateItemsForSub();
  }
  const form=el('form',{onsubmit:(e)=>{
    e.preventDefault();
    const it=state.items.find(x=>x.id===selItem); if(!it) return alert('Select item');
    const modal=el('div',{class:'fixed inset-0 bg-black/40 flex items-center justify-center'},
      el('div',{class:'bg-white p-4 rounded-xl w-96'},[
        el('h3',{class:'font-semibold mb-2'},'Confirm consumption'),
        el('div',{},`Item: ${it.name}`), el('div',{},`Amount: ${amt}`), el('div',{},`Note: ${note||'—'}`),
        el('div',{class:'flex justify-end gap-2 mt-3'},[
          el('button',{class:'px-3 py-1 border rounded-lg',onclick:()=>modal.remove()},'Cancel'),
          el('button',{class:'px-3 py-1 bg-sky-600 text-white rounded-lg btn-record',onclick:()=>{ recordConsumption(it.id,amt,note,entryDate); modal.remove(); document.dispatchEvent(new CustomEvent('statechange')); }},'Confirm')
        ])
      ])
    );
    showAnimatedModal(modal);
  },class:'space-y-2'},[]);

  const subSelect=el('select',{class:'p-2 border rounded-lg sub-select',onchange:e=>{ selSub=e.target.value; updateItemsForSub(); }});
  const itemSelect=el('select',{class:'p-2 border rounded-lg item-select',onchange:e=>selItem=e.target.value});
  form.appendChild(el('div',{class:'flex gap-2'},[subSelect,itemSelect]));
  form.appendChild(el('div',{class:'flex gap-2 items-center'},[
    el('input',{type:'number',min:1,value:1,class:'w-24 p-2 border rounded-lg',onchange:e=>amt=Number(e.target.value)}),
    el('input',{type:'date',class:'p-2 border rounded-lg',onchange:e=>entryDate=e.target.value}),
    el('input',{placeholder:'note',class:'flex-1 p-2 border rounded-lg',onchange:e=>note=e.target.value}),
    el('button',{class:'px-3 py-2 bg-sky-600 text-white rounded-lg btn-record'},'Record')
  ]));
  container.appendChild(form);
  function _stateListener(){ updateSubSelect(); updateItemsForSub(); }
  document.addEventListener('statechange',_stateListener);
  const observer=new MutationObserver(()=>{ if(!document.body.contains(container)){ document.removeEventListener('statechange',_stateListener); observer.disconnect(); } });
  observer.observe(document.body,{childList:true,subtree:true});
  updateSubSelect();
  return container;
}

function getExpiryStatus(dateStr){
  if(!dateStr) return {color:'status-none',label:'—'};
  const today=new Date(), expiry=new Date(dateStr+'T00:00:00');
  const diffDays=Math.ceil((expiry-today)/(1000*60*60*24));
  if(diffDays<0)   return {color:'status-danger',  label:`Expired ${Math.abs(diffDays)} days ago`};
  if(diffDays<=30) return {color:'status-warn-30', label:`${diffDays} days left`};
  if(diffDays<=60) return {color:'status-warn-60', label:`${diffDays} days left`};
  return {color:'status-ok', label:`${diffDays} days left`};
}

function buildVehicleTable(vehicle){
  const rows=[
    ['🛡️ Insurance','insurance'],
    ['📋 Fitness Certificate','fitness'],
    ['🌿 PUC','puc'],
    ['🔧 Last Vehicle Service','vehicleService'],
    ['⚙️ Last OEM Service','oemService'],
    ['💰 Road Tax','roadTax']
  ];
  const table=el('table',{class:'vehicle-table'});
  table.appendChild(el('thead',{},el('tr',{},[
    el('th',{class:'text-left'},'Record'),
    el('th',{class:'text-left'},'Valid Until'),
    el('th',{class:'text-center'},'Doc'),
    el('th',{class:'text-center'},'Action')
  ])));
  const tbody=el('tbody',{});
  rows.forEach(([label,key])=>{
    const rec=vehicle.records[key];
    const status=getExpiryStatus(rec.date);

    // Build expiry progress bar (fills based on days remaining out of 365)
    let barPct = 0, barColor = '#e2e8f0';
    if(rec.date){
      const today=new Date(), expiry=new Date(rec.date+'T00:00:00');
      const diffDays=Math.ceil((expiry-today)/(1000*60*60*24));
      barPct = Math.max(0, Math.min(100, (diffDays/365)*100));
      barColor = diffDays < 0 ? '#ef4444' : diffDays <= 30 ? '#f97316' : diffDays <= 60 ? '#eab308' : '#22c55e';
    }

    const expiryCell = el('td', {}, [
      el('span',{class:`status-pill ${status.color}`}, rec.date ? `${rec.date}` : '—'),
      rec.date ? el('div',{class:'text-xs mt-1',style:'color:#94a3b8'},status.label) : el('span',{},''),
      rec.date ? el('div',{class:'expiry-bar-wrap'},[
        el('div',{class:'expiry-bar-fill',style:`width:${barPct}%;background:${barColor}`})
      ]) : el('span',{})
    ]);

    tbody.appendChild(el('tr',{class:'anim-row-in'},[
      el('td',{style:'font-weight:600;font-size:12.5px'},label),
      expiryCell,
      el('td',{class:'text-center'}, rec.file
        ? el('a',{href:rec.file,target:'_blank',class:'tbl-btn',style:'font-size:11px'},'📄 View')
        : el('span',{style:'color:#cbd5e1;font-size:12px'},'—')),
      el('td',{class:'text-center'},
        el('button',{class:'tbl-btn tbl-btn-primary',onclick:()=>openVehicleEditModal(vehicle.id,key)},'Update'))
    ]));
  });
  table.appendChild(tbody);
  return table;
}

function openVehicleEditModal(vehicleId,recordKey){
  const vehicle=state.vehicleRecords.find(v=>v.id===vehicleId);
  const rec=vehicle.records[recordKey];
  const modal=el('div',{class:'fixed inset-0 bg-black/40 flex items-center justify-center'},
    el('div',{class:'bg-white p-4 rounded-xl w-96'},[
      el('h3',{class:'font-semibold mb-3'},'Update Record'),
      el('input',{type:'date',class:'w-full p-2 border rounded-lg mb-2',value:rec.date,onchange:e=>rec.date=e.target.value}),
      el('input',{type:'file',class:'w-full p-2 border rounded-lg mb-3',onchange:async(e)=>{
        const file=e.target.files[0]; if(!file) return;
        if(file.type!=='application/pdf'){ alert('Only PDF allowed'); return; }
        const reader=new FileReader();
        reader.onload=async function(event){
          const base64=event.target.result.split(',')[1];
          const fileName=`${vehicleId}_${recordKey}_${Date.now()}_${file.name}`;
          const formData=new FormData();
          formData.append('file',base64);
          formData.append('name',fileName);
          formData.append('type',file.type);
          try {
            const res=await fetch(API_URL,{method:'POST',body:formData});
            const result=await res.json();
            if(result.url){ rec.file=result.url; alert('Upload successful'); }
            else alert('Upload failed: '+(result.error||'unknown'));
          } catch(err){ console.error(err); alert('Upload error: '+err.message); }
        };
        reader.readAsDataURL(file);
      }}),
      el('div',{class:'flex justify-end gap-2'},[
        el('button',{class:'px-3 py-1 border rounded-lg',onclick:()=>modal.remove()},'Cancel'),
        el('button',{class:'px-3 py-1 bg-green-600 text-white rounded-lg',onclick:()=>{
          saveToSheet(state); document.dispatchEvent(new CustomEvent('statechange')); modal.remove();
        }},'Save')
      ])
    ])
  );
  showAnimatedModal(modal);
}

function openVehicleInfoEditModal(vehicleId){
  const vehicle=state.vehicleRecords.find(v=>v.id===vehicleId); if(!vehicle) return;
  const modal=el('div',{class:'fixed inset-0 bg-black/40 flex items-center justify-center'},

      el('div',{},[el('label',{class:'text-sm block mb-1'},'Registration Number'),el('input',{class:'w-full p-2 border rounded-lg',value:vehicle.info.regNo,id:'edit-regno'})]),
      el('div',{},[el('label',{class:'text-sm block mb-1'},'Make / Model'),el('input',{class:'w-full p-2 border rounded-lg',value:vehicle.info.makeModel,id:'edit-make'})]),
      el('div',{},[el('label',{class:'text-sm block mb-1'},'Year'),el('input',{class:'w-full p-2 border rounded-lg',value:vehicle.info.year,id:'edit-year'})]),
      el('div',{class:'flex justify-end gap-2 pt-3'},[
        el('button',{class:'px-3 py-1 border rounded-lg',onclick:()=>modal.remove()},'Cancel'),
        el('button',{class:'px-3 py-1 bg-green-600 text-white rounded-lg',onclick:()=>{
          vehicle.info.regNo=modal.querySelector('#edit-regno').value.trim();
          vehicle.info.makeModel=modal.querySelector('#edit-make').value.trim();
          vehicle.info.year=modal.querySelector('#edit-year').value.trim();
          saveToSheet(state); document.dispatchEvent(new CustomEvent('statechange')); modal.remove();
        }},'Save')
      ])
    ])
  );
  showAnimatedModal(modal);
}

/* ---- MODAL HELPER ---- */
function showAnimatedModal(modal){
  modal.classList.add('modal-backdrop');
  const content=modal.querySelector('div');
  if(content) content.classList.add('modal-content');
  document.body.appendChild(modal);
  requestAnimationFrame(()=>modal.classList.add('open'));
  const originalRemove=modal.remove.bind(modal);
  modal.remove=()=>{ modal.classList.remove('open'); setTimeout(()=>originalRemove(),260); };
}
